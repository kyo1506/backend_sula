<header class="header-container">
    <div class="header-text">
        Admin-Professor
    </div>
</header>

<body>
    <mat-grid-list name="grid" cols="14" rowHeight="7vh">
        <mat-grid-tile class="side-tile" [colspan]="1" [rowspan]="11">
            <mat-list class="list" role="list">
                <mat-list-item role="listitem"><button mat-button class="sideButton"
                        (click)="sideGoSala()">Salas</button>
                </mat-list-item>
                <mat-list-item role="listitem"><button mat-button class="sideButton"
                        (click)="sideGoProf()">Professores</button></mat-list-item>
                <mat-list-item role="listitem"><button mat-button class="sideButton"
                        (click)="sideGoConfig()">Configurações</button></mat-list-item>
            </mat-list>
        </mat-grid-tile>

        <mat-grid-tile class="tile" [colspan]="2" [rowspan]="2">
            <form class="input">
                <mat-form-field class="busca" appearance="fill">
                    <mat-label>Busca</mat-label>
                    <input matInput placeholder="" value="">
                </mat-form-field>
            </form>
        </mat-grid-tile>
        <mat-grid-tile class="tile" [colspan]="4" [rowspan]="2">
            <div class="main-button">
                <button mat-raised-button class="button" color="primary" (click)="create()">Novo Professor</button>
                <button mat-raised-button class="button" color="accent" (click)="update()">Update</button>
                <button mat-raised-button class="button" color="warn" (click)="delet()">Deletar</button>
            </div>
        </mat-grid-tile>

        <mat-grid-tile class="tile" [colspan]="7" [rowspan]="2  "></mat-grid-tile>

        <mat-grid-tile class="tile" [colspan]="9" [rowspan]="9  ">
            <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

                <!--- Note that these columns can be defined in any order.
                  The actual rendered columns are set as a property on the row definition" -->

                <!-- Position Column -->
                <ng-container matColumnDef="id">
                    <th mat-header-cell *matHeaderCellDef> Id </th>
                    <td mat-cell *matCellDef="let element"> {{element.id}} </td>
                </ng-container>
                <!-- Name Column -->
                <ng-container matColumnDef="nome">
                    <th mat-header-cell *matHeaderCellDef> Nome </th>
                    <td mat-cell *matCellDef="let element"> {{element.nome}} </td>
                </ng-container>
                <!-- Weight Column -->
                <ng-container matColumnDef="ativo">
                    <th mat-header-cell *matHeaderCellDef> Ativo </th>
                    <td mat-cell *matCellDef="let element"> {{element.ativo}} </td>
                </ng-container>
                <!-- Symbol Column -->
                <ng-container matColumnDef="curso">
                    <th mat-header-cell *matHeaderCellDef> Curso </th>
                    <td mat-cell *matCellDef="let element"> {{element.curso}} </td>
                </ng-container>
                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
        </mat-grid-tile>
    </mat-grid-list>
</body>
